# Конфиг инструментов код-стайла (см. ../code-style.md).
# Споры о форматировании/импортах решают black и isort, а не ревью.

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.isort]
profile = "black"
line_length = 100

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
check_untyped_defs = true
